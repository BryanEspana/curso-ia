site_name: Mini Jira — Documentación Técnica
site_description: Documentación generada automáticamente del proyecto Mini Jira
docs_dir: .
theme:
  name: material
  language: es
  palette:
    scheme: default
    primary: indigo
    accent: indigo
nav:
  - Inicio: index.md
  - API Reference: api-reference.md
  - Base de Datos: base-de-datos.md
  - Diagramas: diagramas.md
  - Cobertura de Tests: cobertura-tests.md
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
